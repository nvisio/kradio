name: Deploy site to Pages

# Replaces the managed "Deploy from a branch" builder, which force-recurses
# submodules and fails to clone the private `tools` submodule
# (hkmoon/kradio-tools). The published site doesn't need tools/ — it's just
# scripts — so we check out WITHOUT submodules and build the same Jekyll site.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules — tools/ is private and not part of the site)
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
