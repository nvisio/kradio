<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 430px; height: 932px; background: #000; font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; color: #fff; overflow: hidden; }
.status-bar { height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 0; font-size: 15px; font-weight: 600; }
.notch { width: 126px; height: 34px; background: #000; border-radius: 0 0 20px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
.promo { text-align: center; padding: 16px 20px 12px; }
.promo h1 { font-size: 22px; font-weight: 700; color: #fff; }
.promo p { font-size: 14px; color: #8e8e93; margin-top: 4px; }
.nav-title { font-size: 34px; font-weight: 700; padding: 8px 20px 12px; }
.list { background: #1c1c1e; border-radius: 12px; margin: 0 16px; overflow: hidden; }
.section-header { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; padding: 20px 16px 6px; background: #000; margin: 0 -0px; }
.section-header:first-child { padding-top: 8px; }
.row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 0.5px solid #38383a; gap: 12px; }
.row:last-child { border-bottom: none; }
.row-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.row-text { flex: 1; }
.row-text .name { font-size: 17px; font-weight: 500; }
.row-text .sub { font-size: 13px; color: #8e8e93; margin-top: 1px; }
.active .name, .active .row-icon { color: #0a84ff; }
.playing-icon { color: #0a84ff; font-size: 13px; }
.mini-player { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(44,44,46,0.95); backdrop-filter: blur(20px); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-top: 0.5px solid #48484a; }
.mini-art { width: 44px; height: 44px; border-radius: 6px; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; font-size: 20px; color: #666; }
.mini-text { flex: 1; }
.mini-text .t1 { font-size: 14px; font-weight: 500; }
.mini-text .t2 { font-size: 12px; color: #8e8e93; }
.mini-play { font-size: 22px; color: #fff; }
.home-bar { width: 134px; height: 5px; background: #fff; border-radius: 3px; margin: 8px auto; }
</style></head><body>
<div class="notch"></div>
<div class="status-bar"><span>9:41</span><span style="letter-spacing:2px">📶 🔋</span></div>
<div class="promo"><h1>21+ Radio Stations</h1><p>Korean & International Radio in One App</p></div>
<div class="nav-title">K-Radio Tuner</div>
<div style="margin-top: 4px;">
<div class="section-header" style="margin: 0 16px; background: transparent;">KBS</div>
<div class="list">
<div class="row active"><div class="row-icon">📡</div><div class="row-text"><div class="name">KBS 1라디오</div><div class="sub">뉴스 · 시사 · 교양</div></div><span class="playing-icon">🔊</span></div>
<div class="row"><div class="row-icon">😊</div><div class="row-text"><div class="name">KBS HappyFM</div><div class="sub">오락 · 음악</div></div></div>
<div class="row"><div class="row-icon">🎵</div><div class="row-text"><div class="name">KBS ClassicFM</div><div class="sub">클래식 음악</div></div></div>
<div class="row"><div class="row-icon">🎧</div><div class="row-text"><div class="name">KBS CoolFM</div><div class="sub">대중음악</div></div></div>
</div>
<div class="section-header" style="margin: 0 16px; background: transparent;">MBC</div>
<div class="list">
<div class="row"><div class="row-icon">📻</div><div class="row-text"><div class="name">MBC 표준FM</div><div class="sub">뉴스 · 시사 · 오락</div></div></div>
<div class="row"><div class="row-icon">🎶</div><div class="row-text"><div class="name">MBC FM4U</div><div class="sub">음악 · DJ</div></div></div>
</div>
<div class="section-header" style="margin: 0 16px; background: transparent;">SBS</div>
<div class="list">
<div class="row"><div class="row-icon">⚡</div><div class="row-text"><div class="name">SBS 파워FM</div><div class="sub">대중음악 · DJ</div></div></div>
</div>
</div>
<div class="mini-player">
<div class="mini-art">📡</div>
<div class="mini-text"><div class="t1">KBS 1라디오</div><div class="t2">뉴스광장 1부</div></div>
<div class="mini-play">⏸</div>
</div>
<div class="home-bar"></div>
</body></html>
